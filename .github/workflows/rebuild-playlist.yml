name: Rebuild Spotify playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'
      timezone: 'America/New_York'

permissions:
  contents: write

concurrency:
  group: dailydrive-rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Write config.yaml from secret
        run: |
          cat > config.yaml <<'EOF'
          ${{ secrets.DAILYDRIVE_CONFIG_YAML }}
          EOF

      - name: Run dailydrive
        run: npm start

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update dailydrive state" || echo "No changes to commit"
          git push
